<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Kas & Donatur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        danger: '#F53F3F',
                        warning: '#FF7D00',
                        neutral: '#86909C'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            }
            .hover-up {
                transition: all 0.25s ease;
            }
            .hover-up:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            }
        }
    </style>
</head>
<body class="font-inter bg-gray-50 min-h-screen">
    <a href="admin.html" class="fixed top-6 right-6 z-50 bg-white hover-up px-5 py-2.5 rounded-full font-semibold text-primary card-shadow">
        Login Admin
    </a>

    <div class="max-w-7xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-[clamp(1.8rem,4vw,2.8rem)] font-bold text-gray-800 mb-2">📊 Laporan Kas dan Donatur</h1>
            <p class="text-neutral text-lg">Transparansi penuh laporan keuangan</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-10">
            <div class="bg-white rounded-2xl p-6 card-shadow hover-up">
                <p class="text-neutral font-medium mb-2">Total Kas Masuk</p>
                <p class="text-3xl font-bold text-success" id="totalMasuk">Rp 0</p>
            </div>
            <div class="bg-white rounded-2xl p-6 card-shadow hover-up">
                <p class="text-neutral font-medium mb-2">Total Kas Keluar</p>
                <p class="text-3xl font-bold text-danger" id="totalKeluar">Rp 0</p>
            </div>
            <div class="bg-white rounded-2xl p-6 card-shadow hover-up">
                <p class="text-neutral font-medium mb-2">Saldo Akhir</p>
                <p class="text-3xl font-bold text-primary" id="saldo">Rp 0</p>
            </div>
            <div class="bg-white rounded-2xl p-6 card-shadow hover-up">
                <p class="text-neutral font-medium mb-2">Jumlah Donatur</p>
                <p class="text-3xl font-bold text-gray-800" id="totalDonatur">0</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl card-shadow p-6 mb-8">
            <h2 class="text-xl font-bold mb-5 text-gray-800">💰 Laporan Kas</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-200">
                            <th class="text-left py-4 px-4 font-semibold text-gray-600">Tanggal</th>
                            <th class="text-left py-4 px-4 font-semibold text-gray-600">Keterangan</th>
                            <th class="text-left py-4 px-4 font-semibold text-gray-600">Jenis</th>
                            <th class="text-right py-4 px-4 font-semibold text-gray-600">Jumlah</th>
                        </tr>
                    </thead>
                    <tbody id="kasTable">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-2xl card-shadow p-6">
            <h2 class="text-xl font-bold mb-5 text-gray-800">🤝 Daftar Donatur</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-200">
                            <th class="text-left py-4 px-4 font-semibold text-gray-600">Nama</th>
                            <th class="text-left py-4 px-4 font-semibold text-gray-600">Telepon</th>
                            <th class="text-left py-4 px-4 font-semibold text-gray-600">Tanggal</th>
                            <th class="text-right py-4 px-4 font-semibold text-gray-600">Total Donasi</th>
                        </tr>
                    </thead>
                    <tbody id="donaturTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function formatRupiah(angka) {
            return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function formatTanggal(tanggal) {
            return new Date(tanggal).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})
        }

        function getData() {
            const local = localStorage.getItem('kasData');
            if(local) return JSON.parse(local);
            
            // Jika belum ada data ambil dari db.json
            fetch('db.json').then(res => res.json()).then(data => {
                localStorage.setItem('kasData', JSON.stringify(data));
                location.reload();
            })
            return {laporan_kas:[], donatur:[]}
        }

        function loadData() {
            const data = getData();

            let masuk = 0, keluar = 0;
            data.laporan_kas.forEach(i => i.jenis == 'masuk' ? masuk += i.jumlah : keluar += i.jumlah);

            document.getElementById('totalMasuk').textContent = formatRupiah(masuk);
            document.getElementById('totalKeluar').textContent = formatRupiah(keluar);
            document.getElementById('saldo').textContent = formatRupiah(masuk - keluar);
            document.getElementById('totalDonatur').textContent = data.donatur.length;

            document.getElementById('kasTable').innerHTML = data.laporan_kas.sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal)).map(item => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="py-4 px-4">\({formatTanggal(item.tanggal)}</td>
                    <td class="py-4 px-4">\){item.keterangan}</td>
                    <td class="py-4 px-4">
                        <span class="px-2.5 py-1 rounded-full text-xs font-semibold \({item.jenis == 'masuk' ? 'bg-green-50 text-success' : 'bg-red-50 text-danger'}">
                            \){item.jenis.toUpperCase()}
                        </span>
                    </td>
                    <td class="py-4 px-4 text-right font-medium">\({formatRupiah(item.jumlah)}</td>
                </tr>
            `).join('');

            document.getElementById('donaturTable').innerHTML = data.donatur.sort((a,b) => b.total_donasi - a.total_donasi).map(item => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="py-4 px-4 font-medium">\){item.nama}</td>
                    <td class="py-4 px-4">\({item.telepon}</td>
                    <td class="py-4 px-4">\){formatTanggal(item.tanggal_bergabung)}</td>
                    <td class="py-4 px-4 text-right font-medium">\({formatRupiah(item.total_donasi)}</td>
                </tr>
            `).join('');
        }

        // Auto refresh data setiap 2 detik
        loadData();
        setInterval(loadData, 2000);
    </script>
</body>
</html>
